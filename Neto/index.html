<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Garante que o site se adapte ao tamanho da tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapore D'Italia</title>

    <!-- BIBLIOTECA -->
    <link rel="stylesheet" href="../Biblioteca/cores.css">
    <link rel="stylesheet" href="../Biblioteca/botoes.css">

    <!-- CSS dos componentes Neto-->
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="menu-hamburguer.css">
    <link rel="stylesheet" href="footer.css">

    <style>
        /* Layout da página: faz o footer sempre ficar no fim da tela */
        body {
            margin: 0;
            background-color: var(--bege-claro);
            min-height: 100vh;          /* altura mínima = altura da tela */
            display: flex;
            flex-direction: column;     /* empilha header > main > footer */
        }

        /* main "estica" e ocupa o espaço sobrando, empurrando o footer pra baixo */
        main {
            flex: 1;
            padding: 60px 20px;
            text-align: center;
        }

        .titulo-pagina {
            color: var(--vermelho);
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitulo {
            color: var(--cinza);
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <!-- HEADER (componente do Neto) — o script injeta o HTML aqui -->
    <script src="header.js"></script>

    <main>
        <h1 class="titulo-pagina">Sapore D'Italia</h1>
        <p class="subtitulo">Página de demonstração</p>
    </main>

    <!-- FOOTER (componente do Neto) — o script injeta o HTML aqui -->
    <script src="footer.js"></script>

    <!-- Define a função abrirMenu() usada pelo hambúrguer -->
    <script src="menu-hamburguer.js"></script>
</body>
</html>
