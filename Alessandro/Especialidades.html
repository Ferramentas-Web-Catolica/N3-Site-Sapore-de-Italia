<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especialidades - Sapore D'Italia</title>
    <link rel="stylesheet" href="Especialidades.css">
</head>
<body>

    <!-- Seção Especialidades Sapore D'Italia -->
    <section class="container-especialidades">
        <h2 class="titulo-especialidades">Especialidades Sapore D'Italia</h2>
        
        <div class="grid-especialidades">
            
            <!-- CARD 1: Penne -->
            <div class="card-prato">
                <div class="moldura-img">
                    <img src="Imagens/especialidadepenne.png" alt="Penne al Pomodoro">
                </div>
                <h3>Penne al Pomodoro</h3>
            </div>

            <!-- CARD 2: Carbonara (Macarrão) -->
            <div class="card-prato">
                <div class="moldura-img">
                    <img src="Imagens/especialidademacarrao.png" alt="Spaghetti alla Carbonara">
                </div>
                <h3>Spaghetti alla Carbonara</h3>
            </div>

            <!-- CARD 3: Lasanha -->
            <div class="card-prato">
                <div class="moldura-img">
                    <img src="Imagens/especialidadelasanha.png" alt="Lasagna alla Bolognese">
                </div>
                <h3>Lasagna alla Bolognese</h3>
            </div>

        </div>
    </section>

</body>
</html>
