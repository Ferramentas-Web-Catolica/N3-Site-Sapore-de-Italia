<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Garante que o site se adapte ao tamanho da tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes</title>

    

    <!-- BIBLIOTECA -->
    <link rel="stylesheet" href="../Biblioteca/cores.css">
    <link rel="stylesheet" href="../Biblioteca/botoes.css">

    <link rel="stylesheet" href="michelin.css">
    <link rel="stylesheet" href="reservar.css">
    <link rel="stylesheet" href="menu-selecao.css">

</head>


    <style>
        /* Layout da página: faz o footer sempre ficar no fim da tela */
        body {
            margin: 0;
            background-color: var(--bege-claro);
            min-height: 100vh;          /* altura mínima = altura da tela */
            display: flex;
            flex-direction: column;     /* empilha header > main > footer */
        }

        /* main "estica" e ocupa o espaço sobrando, empurrando o footer pra baixo */
        main {
            flex: 1;
            padding: 60px 20px;
            text-align: center;
        }

        .titulo-pagina {
            color: var(--vermelho);
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitulo {
            color: var(--cinza);
            margin-bottom: 50px;
        }
    </style>
<body>

    <script src="michelin.js"></script>

    <script src="reservar.js"></script>

    <script src="menu-selecao.js"></script>
</body>
</html>
